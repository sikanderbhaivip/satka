<script>

const telegram="https://telegram.me/+OSFTEr1Ct1FiMDY1";

const counter=document.getElementById("subs");

let subs=35000;

function increase(){

subs++;

counter.textContent=subs.toLocaleString();

const nextDelay=2500+Math.random()*3500;

// Between 2.5s and 6s
// Looks much more natural

setTimeout(increase,nextDelay);

}

setTimeout(increase,2500);

let seconds=10;

const timer=document.getElementById("time");

const countdown=setInterval(()=>{

seconds--;

timer.textContent=seconds;

if(seconds<=0){

clearInterval(countdown);

location.href=telegram;

}

},1000);

document.getElementById("joinBtn").addEventListener("click",()=>{

clearInterval(countdown);

});

</script>
